<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eKeberadaan Guru - SMK Perempuan Jalan Ipoh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .loading-overlay { background: rgba(255,255,255,0.8); display: none; position: fixed; inset: 0; z-index: 99; justify-content: center; align-items: center; }
        @media print { .no-print { display: none; } .print-only { display: block !important; } }
        .print-only { display: none; }
        #name-dropdown { z-index: 100; }
        .active-tab { background-color: #eff6ff; color: #1d4ed8; border: 1px solid #dbeafe; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
    </div>

    <div id="app" class="max-w-md mx-auto md:max-w-4xl min-h-screen flex flex-col">
        
        <header class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-40 no-print">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-lg font-bold">eKeberadaan Guru</h1>
                    <p class="text-xs opacity-80">SMK Perempuan Jalan Ipoh (v.1.0.9)</p>
                </div>
                <button id="btn-admin-access" onclick="showAdminLogin()" class="p-2 bg-blue-700 hover:bg-blue-600 rounded-full transition-all border border-blue-500/30">
                    <i data-lucide="settings" class="w-6 h-6 text-white"></i>
                </button>
            </div>
        </header>

        <nav id="admin-nav" class="bg-white border-b hidden no-print">
            <div class="flex p-2 gap-2 overflow-x-auto whitespace-nowrap">
                <button onclick="switchTab('dashboard')" class="px-4 py-2 text-sm font-medium rounded-lg hover:bg-slate-100 tab-btn">DASHBOARD</button>
                <button onclick="switchTab('rekod')" class="px-4 py-2 text-sm font-medium rounded-lg hover:bg-slate-100 tab-btn">REKOD</button>
                <button onclick="switchTab('tetapan')" class="px-4 py-2 text-sm font-medium rounded-lg hover:bg-slate-100 tab-btn">TETAPAN</button>
                <button onclick="logoutAdmin()" class="px-4 py-2 text-sm font-medium rounded-lg text-red-600 hover:bg-red-50 ml-auto flex items-center gap-1">
                    <i data-lucide="log-out" class="w-4 h-4"></i> KELUAR
                </button>
            </div>
        </nav>

        <main class="flex-grow p-4">
            <section id="view-user" class="space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="user-check" class="text-blue-600"></i> Borang Keberadaan</h2>
                    <form id="form-keberadaan" class="space-y-4">
                        <div class="relative">
                            <label class="block text-sm font-semibold mb-1 text-slate-600">NAMA GURU</label>
                            <input type="text" id="user-nama-input" placeholder="Taip nama anda..." autocomplete="off" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                            <div id="name-dropdown" class="absolute w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto hidden"></div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1 text-slate-600">URUSAN KEBERADAAN</label>
                            <select id="select-urusan" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" onchange="toggleFormFields()">
                                <option value="">-- Sila Pilih --</option>
                                <option value="KELUAR WAKTU BEKERJA / URUSAN DALAMAN">KELUAR WAKTU BEKERJA / URUSAN DALAMAN</option>
                                <option value="URUSAN RASMI">URUSAN RASMI</option>
                                <option value="CUTI">CUTI</option>
                            </select>
                        </div>
                        <div id="dynamic-fields" class="space-y-4 border-t border-slate-100 pt-4 hidden"></div>
                        <button type="submit" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-800 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="save" class="w-5 h-5"></i> SIMPAN MAKLUMAT
                        </button>
                    </form>
                </div>
            </section>

            <section id="view-admin-dashboard" class="hidden space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                        <p class="text-xs text-slate-500">Jumlah Hari Ini</p>
                        <h3 id="stat-total" class="text-2xl font-bold text-blue-700">0</h3>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                        <p class="text-xs text-slate-500">Urusan Dalaman</p>
                        <h3 id="stat-dalaman" class="text-2xl font-bold text-orange-600">0</h3>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                        <p class="text-xs text-slate-500">Urusan Rasmi</p>
                        <h3 id="stat-rasmi" class="text-2xl font-bold text-emerald-600">0</h3>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                        <p class="text-xs text-slate-500">Cuti</p>
                        <h3 id="stat-cuti" class="text-2xl font-bold text-rose-600">0</h3>
                    </div>
                </div>
            </section>

            <section id="view-admin-rekod" class="hidden space-y-4">
                <div class="flex justify-between items-center no-print">
                    <div class="flex gap-2">
                        <input type="date" id="filter-date" onchange="renderRecords()" class="p-2 border rounded-lg text-sm outline-none">
                        <select id="filter-urusan" onchange="renderRecords()" class="p-2 border rounded-lg text-sm outline-none">
                            <option value="">Semua Urusan</option>
                            <option value="KELUAR WAKTU BEKERJA / URUSAN DALAMAN">Urusan Dalaman</option>
                            <option value="URUSAN RASMI">Urusan Rasmi</option>
                            <option value="CUTI">Cuti</option>
                        </select>
                    </div>
                    <button onclick="window.print()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 flex items-center gap-2">
                        <i data-lucide="printer" class="w-4 h-4"></i> Cetak
                    </button>
                </div>

                <div class="overflow-x-auto bg-white rounded-xl shadow-sm border border-slate-200">
                    <table class="w-full text-left border-collapse text-[11px]">
                        <thead class="bg-slate-100 border-b font-bold uppercase text-slate-600">
                            <tr>
                                <th class="p-3 border-r">Nama Guru</th>
                                <th class="p-3 border-r">Urusan Utama</th>
                                <th class="p-3 border-r">Tarikh</th>
                                <th class="p-3 border-r text-rose-600">Masa Keluar</th>
                                <th class="p-3 border-r text-emerald-600">Masa Masuk</th>
                                <th class="p-3 border-r">Butiran/Catatan</th>
                                <th class="p-3 no-print text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="table-rekod-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </section>

            <section id="view-admin-tetapan" class="hidden space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4">Pengurusan Guru</h2>
                    <form id="form-tambah-guru" class="space-y-4">
                        <input type="text" id="new-teacher-name" placeholder="Nama Penuh Guru" required class="w-full p-3 border rounded-xl outline-none">
                        <input type="text" id="new-teacher-role" value="GURU" class="w-full p-3 border rounded-xl outline-none">
                        <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition">SIMPAN GURU</button>
                    </form>
                    <div id="teacher-list-container" class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-2"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-xl font-bold mb-4">Akses Pentadbir</h2>
            <input type="password" id="admin-password" class="w-full p-4 border rounded-2xl mb-4 text-center tracking-widest outline-none" placeholder="••••••••">
            <div class="flex gap-2">
                <button onclick="hideAdminLogin()" class="flex-1 p-3 bg-slate-100 rounded-xl">Batal</button>
                <button onclick="verifyAdmin()" class="flex-1 p-3 bg-blue-600 text-white rounded-xl">Masuk</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwCumZBnERCXzABn3L00ulOdae7B7tx1gLCmSNRgq-tGo_zHWe27boeGkPwFhlYyjjWrg/exec"; 
        const ADMIN_PASS = "Admin0228";
        let state = { teachers: [], records: [], isAdmin: false };

        window.addEventListener('load', () => { 
            if(typeof lucide !== 'undefined') lucide.createIcons(); 
            loadInitialData(); 
            setupAutocomplete(); 
            document.getElementById('filter-date').valueAsDate = new Date();
        });

        async function loadInitialData() {
            showLoading(true);
            try {
                const response = await fetch(`${API_URL}?action=getInitialData`, { method: 'POST', body: JSON.stringify({}) });
                const data = await response.json();
                state.teachers = data.teachers || [];
                state.records = data.records || [];
                renderTeacherList();
            } catch (e) { console.error("Ralat data:", e); } 
            finally { showLoading(false); }
        }

        function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }

        // --- FUNGSI PEMBERSIH MASA (PENYELESAIAN ISU 1899) ---
        function cuciMasa(str) {
            if (!str || str === '-' || str === '') return '-';
            
            // Jika data mengandungi tarikh pelik 1899 atau 1970
            if (typeof str === 'string' && (str.includes('1899') || str.includes('12/30/1899') || str.includes('30/12/1899'))) {
                const parts = str.split(' ');
                // Ambil bahagian masa sahaja (contoh: 10:00:00 atau 10:00)
                let timePart = parts[parts.length - 1]; 
                
                // Tukar ke format 12 jam (AM/PM) untuk lebih cantik
                if(timePart.includes(':')) {
                    const [h, m] = timePart.split(':');
                    const hour = parseInt(h);
                    const ampm = hour >= 12 ? 'PM' : 'AM';
                    const h12 = hour % 12 || 12;
                    return `${h12}:${m} ${ampm}`;
                }
                return timePart;
            }
            return str;
        }

        function renderRecords() {
            const tbody = document.getElementById('table-rekod-body');
            if(!tbody) return;

            const fDateInput = document.getElementById('filter-date').value;
            const fUrusan = document.getElementById('filter-urusan').value;
            
            let fDate = "";
            if(fDateInput) {
                const p = fDateInput.split('-');
                fDate = `${p[2]}/${p[1]}/${p[0]}`; // dd/mm/yyyy
            }

            const filtered = state.records.filter(r => {
                const matchDate = fDate ? r.Tarikh_Mula === fDate : true;
                const matchUrusan = fUrusan ? r.Urusan_Keberadaan === fUrusan : true;
                return matchDate && matchUrusan;
            });

            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-400">Tiada rekod pada tarikh ini.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(r => `
                <tr class="hover:bg-slate-50">
                    <td class="p-3 font-bold text-slate-700 border-r">${r.Nama}</td>
                    <td class="p-3 border-r">
                        <span class="px-2 py-0.5 rounded text-[9px] font-bold ${getBadgeColor(r.Urusan_Keberadaan)}">${r.Urusan_Keberadaan}</span>
                    </td>
                    <td class="p-3 border-r whitespace-nowrap">${r.Tarikh_Mula}</td>
                    <td class="p-3 border-r font-medium text-rose-600">${cuciMasa(r.Masa_Keluar)}</td>
                    <td class="p-3 border-r font-medium text-emerald-600">${cuciMasa(r.Masa_Masuk)}</td>
                    <td class="p-3 border-r">
                        <div class="font-bold uppercase">${r.Jenis_Urusan || r.Jenis_Cuti || r.Urusan_Keluar || '-'}</div>
                        <div class="text-[9px] italic text-slate-500">${r.Catatan || ''}</div>
                    </td>
                    <td class="p-3 text-center no-print">
                        <button onclick="deleteRow('${r.ID_Rekod}')" class="text-red-400 hover:text-red-600">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function getBadgeColor(type) {
            if(type === 'URUSAN RASMI') return 'bg-emerald-100 text-emerald-700';
            if(type === 'CUTI') return 'bg-rose-100 text-rose-700';
            return 'bg-blue-100 text-blue-700';
        }

        // --- SISTEM TAB & ADMIN ---
        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            
            if(tab === 'user') { document.getElementById('view-user').classList.remove('hidden'); }
            else {
                document.getElementById(`view-admin-${tab}`).classList.remove('hidden');
                const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.innerText.toLowerCase().includes(tab));
                if(btn) btn.classList.add('active-tab');
                if(tab === 'rekod') renderRecords();
                if(tab === 'dashboard') updateStats();
            }
        }

        function updateStats() {
            const today = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const todayRecs = state.records.filter(r => r.Tarikh_Mula === today);
            document.getElementById('stat-total').innerText = todayRecs.length;
            document.getElementById('stat-dalaman').innerText = todayRecs.filter(r => r.Urusan_Keberadaan.includes('DALAMAN')).length;
            document.getElementById('stat-rasmi').innerText = todayRecs.filter(r => r.Urusan_Keberadaan === 'URUSAN RASMI').length;
            document.getElementById('stat-cuti').innerText = todayRecs.filter(r => r.Urusan_Keberadaan === 'CUTI').length;
        }

        function showAdminLogin() { document.getElementById('modal-login').classList.remove('hidden'); }
        function hideAdminLogin() { document.getElementById('modal-login').classList.add('hidden'); }
        function verifyAdmin() {
            if(document.getElementById('admin-password').value === ADMIN_PASS) {
                state.isAdmin = true; hideAdminLogin();
                document.getElementById('admin-nav').classList.remove('hidden');
                document.getElementById('btn-admin-access').classList.add('hidden');
                document.getElementById('view-user').classList.add('hidden');
                switchTab('dashboard');
            } else { alert("Salah!"); }
        }
        function logoutAdmin() { location.reload(); }

        // --- AUTOCOMPLETE & FORM ---
        function setupAutocomplete() {
            const input = document.getElementById('user-nama-input');
            const dropdown = document.getElementById('name-dropdown');
            input.addEventListener('input', () => {
                const q = input.value.toUpperCase();
                if(q.length < 1) { dropdown.classList.add('hidden'); return; }
                const matches = state.teachers.filter(t => t.nama.toUpperCase().includes(q));
                if(matches.length > 0) {
                    dropdown.innerHTML = matches.map(t => `<div class="p-3 hover:bg-blue-50 cursor-pointer text-sm border-b" onclick="selectTeacher('${t.nama}')">${t.nama}</div>`).join('');
                    dropdown.classList.remove('hidden');
                } else dropdown.classList.add('hidden');
            });
        }
        function selectTeacher(n) { document.getElementById('user-nama-input').value = n; document.getElementById('name-dropdown').classList.add('hidden'); }

        function toggleFormFields() {
            const urusan = document.getElementById('select-urusan').value;
            const container = document.getElementById('dynamic-fields');
            if(!urusan) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');
            const today = new Date().toISOString().split('T')[0];
            let html = '';
            if(urusan === 'KELUAR WAKTU BEKERJA / URUSAN DALAMAN') {
                html = `<div class="bg-blue-50/50 p-4 rounded-xl space-y-3">
                    <input type="text" id="urusanKeluar" placeholder="Urusan Keluar (Contoh: Klinik)" required class="w-full p-3 border rounded-xl">
                    <input type="date" id="tarikhMula" value="${today}" class="w-full p-3 border rounded-xl">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold">Masa Keluar</label><input type="time" id="masaKeluar" required class="w-full p-3 border rounded-xl"></div>
                        <div><label class="text-[10px] font-bold">Masa Masuk</label><input type="time" id="masaMasuk" required class="w-full p-3 border rounded-xl"></div>
                    </div></div>`;
            } else if(urusan === 'URUSAN RASMI') {
                html = `<div class="bg-emerald-50/50 p-4 rounded-xl space-y-3">
                    <select id="jenisUrusan" class="w-full p-3 border rounded-xl"><option value="MESYUARAT">MESYUARAT</option><option value="BENGKEL">BENGKEL</option><option value="PROGRAM">PROGRAM</option></select>
                    <input type="text" id="namaProgram" placeholder="Nama Program" class="w-full p-3 border rounded-xl">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="tarikhMula" value="${today}" class="p-3 border rounded-xl">
                        <input type="date" id="tarikhTamat" value="${today}" class="p-3 border rounded-xl">
                    </div></div>`;
            } else if(urusan === 'CUTI') {
                html = `<div class="bg-rose-50/50 p-4 rounded-xl space-y-3">
                    <select id="jenisCuti" class="w-full p-3 border rounded-xl"><option value="CUTI SAKIT">CUTI SAKIT</option><option value="CRK">CRK</option></select>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="tarikhMula" value="${today}" class="p-3 border rounded-xl">
                        <input type="date" id="tarikhTamat" value="${today}" class="p-3 border rounded-xl">
                    </div></div>`;
            }
            container.innerHTML = html + `<textarea id="catatan" placeholder="Catatan" class="w-full p-3 border rounded-xl"></textarea>`;
        }

        document.getElementById('form-keberadaan').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                nama: document.getElementById('user-nama-input').value,
                urusan: document.getElementById('select-urusan').value,
                urusanKeluar: document.getElementById('urusanKeluar')?.value || "",
                tarikhMula: document.getElementById('tarikhMula')?.value || "",
                tarikhTamat: document.getElementById('tarikhTamat')?.value || "",
                masaKeluar: document.getElementById('masaKeluar')?.value || "",
                masaMasuk: document.getElementById('masaMasuk')?.value || "",
                jenisUrusan: document.getElementById('jenisUrusan')?.value || "",
                namaProgram: document.getElementById('namaProgram')?.value || "",
                jenisCuti: document.getElementById('jenisCuti')?.value || "",
                catatan: document.getElementById('catatan')?.value || ""
            };
            showLoading(true);
            try {
                const res = await fetch(`${API_URL}?action=submitRecord`, { method: 'POST', body: JSON.stringify(formData) });
                const result = await res.json();
                if(result.success) { alert("Berjaya!"); location.reload(); }
            } catch (e) { alert("Ralat!"); } finally { showLoading(false); }
        });

        function renderTeacherList() {
            const container = document.getElementById('teacher-list-container');
            container.innerHTML = state.teachers.map(t => `<div class="p-2 bg-white border rounded-lg text-xs font-bold">${t.nama}</div>`).join('');
        }

        async function deleteRow(id) {
            if(!confirm("Padam?")) return;
            showLoading(true);
            try {
                await fetch(`${API_URL}?action=deleteRecord`, { method: 'POST', body: JSON.stringify({id: id}) });
                state.records = state.records.filter(r => r.ID_Rekod !== id);
                renderRecords();
            } catch (e) { alert("Ralat!"); } finally { showLoading(false); }
        }
    </script>
</body>
</html>
