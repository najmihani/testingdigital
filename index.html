<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eKeberadaan Guru - SMK Perempuan Jalan Ipoh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .loading-overlay { 
            background: rgba(255,255,255,0.8); 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 99; 
            justify-content: center; 
            align-items: center; 
        }
        @media print { .no-print { display: none; } .print-only { display: block !important; } }
        .print-only { display: none; }
        #name-dropdown { z-index: 100; }
        .active-tab { background-color: #eff6ff; color: #1d4ed8; border: 1px solid #dbeafe; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
    </div>

    <div id="app" class="max-w-md mx-auto md:max-w-4xl min-h-screen flex flex-col">
        <header class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-40 no-print">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-lg font-bold">eKeberadaan Guru</h1>
                    <p class="text-xs opacity-80">SMK Perempuan Jalan Ipoh (v.1.0.6)</p>
                </div>
                <button id="btn-admin-access" onclick="showAdminLogin()" class="p-2 bg-blue-700 hover:bg-blue-600 rounded-full transition-all border border-blue-500/30">
                    <i data-lucide="settings" class="w-6 h-6 text-white"></i>
                </button>
            </div>
        </header>

        <nav id="admin-nav" class="bg-white border-b overflow-x-auto whitespace-nowrap hidden no-print">
            <div class="flex p-2 gap-2">
                <button id="tab-dashboard" onclick="switchTab('dashboard')" class="px-4 py-2 text-sm font-medium rounded-lg hover:bg-slate-100 tab-btn active-tab">DASHBOARD</button>
                <button id="tab-rekod" onclick="switchTab('rekod')" class="px-4 py-2 text-sm font-medium rounded-lg hover:bg-slate-100 tab-btn">REKOD</button>
                <button id="tab-tetapan" onclick="switchTab('tetapan')" class="px-4 py-2 text-sm font-medium rounded-lg hover:bg-slate-100 tab-btn">PENGURUSAN GURU</button>
                <button onclick="logoutAdmin()" class="px-4 py-2 text-sm font-medium rounded-lg text-red-600 hover:bg-red-50 ml-auto flex items-center gap-1">
                    <i data-lucide="log-out" class="w-4 h-4"></i> KELUAR
                </button>
            </div>
        </nav>

        <main class="flex-grow p-4">
            <section id="view-user" class="space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="user-check" class="text-blue-600"></i> Borang Keberadaan</h2>
                    <form id="form-keberadaan" class="space-y-4">
                        <div class="relative">
                            <label class="block text-sm font-semibold mb-1 text-slate-600">NAMA GURU</label>
                            <input type="text" id="user-nama-input" placeholder="Taip nama anda..." autocomplete="off" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                            <div id="name-dropdown" class="absolute w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto hidden"></div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1 text-slate-600">URUSAN KEBERADAAN</label>
                            <select id="select-urusan" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" onchange="toggleFormFields()">
                                <option value="">-- Sila Pilih --</option>
                                <option value="KELUAR WAKTU BEKERJA / URUSAN DALAMAN">KELUAR WAKTU BEKERJA / URUSAN DALAMAN</option>
                                <option value="URUSAN RASMI">URUSAN RASMI</option>
                                <option value="CUTI">CUTI</option>
                            </select>
                        </div>
                        <div id="dynamic-fields" class="space-y-4 border-t border-slate-100 pt-4 hidden"></div>
                        <button type="submit" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-800 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="save" class="w-5 h-5"></i> SIMPAN MAKLUMAT
                        </button>
                    </form>
                </div>
            </section>

            <section id="view-admin-dashboard" class="hidden space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                        <h3 class="text-sm font-bold text-slate-500 mb-2 uppercase">Status Guru Hari Ini</h3>
                        <div class="h-64">
                            <canvas id="chartKehadiran"></canvas>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                        <h3 class="text-sm font-bold text-slate-500 mb-2 uppercase">Kategori Ketidakhadiran</h3>
                        <div class="h-64">
                            <canvas id="chartKategori"></canvas>
                        </div>
                    </div>
                </div>
            </section>

            <section id="view-admin-rekod" class="hidden space-y-4">
                <div class="bg-white p-4 rounded-xl border border-slate-200 flex flex-wrap gap-2 no-print shadow-sm">
                    <div class="flex-1 min-w-[150px]">
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">TARIKH</label>
                        <input type="date" id="filter-date" onchange="renderRecords()" class="w-full p-2 border rounded-lg text-sm outline-none">
                    </div>
                    <div class="flex-1 min-w-[150px]">
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">URUSAN</label>
                        <select id="filter-urusan" onchange="renderRecords()" class="w-full p-2 border rounded-lg text-sm outline-none">
                            <option value="">Semua Urusan</option>
                            <option value="KELUAR WAKTU BEKERJA / URUSAN DALAMAN">URUSAN DALAMAN</option>
                            <option value="URUSAN RASMI">URUSAN RASMI</option>
                            <option value="CUTI">CUTI</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button onclick="window.print()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm flex items-center gap-2 h-[38px]">
                            <i data-lucide="printer" class="w-4 h-4"></i> Cetak
                        </button>
                    </div>
                </div>
                
                <div class="overflow-x-auto bg-white rounded-xl border border-slate-200 shadow-sm">
                    <table class="w-full text-left border-collapse min-w-[900px]">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-3 text-xs font-bold uppercase text-slate-500">Nama Guru</th>
                                <th class="p-3 text-xs font-bold uppercase text-slate-500">Urusan</th>
                                <th class="p-3 text-xs font-bold uppercase text-slate-500">Masa / Tarikh</th>
                                <th class="p-3 text-xs font-bold uppercase text-slate-500">Catatan/Butiran</th>
                                <th class="p-3 text-xs font-bold uppercase text-slate-500 no-print text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="table-rekod-body" class="text-sm divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </section>

            <section id="view-admin-tetapan" class="hidden space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4">Tambah Guru Baru</h2>
                    <form id="form-tambah-guru" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="new-teacher-name" required placeholder="Nama Penuh Guru" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                            <input type="text" id="new-teacher-role" value="GURU" placeholder="Jawatan" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                        <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition-all">SIMPAN GURU</button>
                    </form>
                </div>
                <div id="teacher-list-container" class="grid grid-cols-1 md:grid-cols-2 gap-2"></div>
            </section>
        </main>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-sm text-center shadow-2xl">
            <h2 class="text-xl font-bold mb-4">Akses Pentadbir</h2>
            <input type="password" id="admin-password" class="w-full p-4 border rounded-2xl mb-4 text-center tracking-widest outline-none" placeholder="••••••••">
            <div class="flex gap-2">
                <button onclick="hideAdminLogin()" class="flex-1 p-3 bg-slate-100 rounded-xl">Batal</button>
                <button onclick="verifyAdmin()" class="flex-1 p-3 bg-blue-600 text-white rounded-xl">Masuk</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwCumZBnERCXzABn3L00ulOdae7B7tx1gLCmSNRgq-tGo_zHWe27boeGkPwFhlYyjjWrg/exec"; 
        const ADMIN_PASS = "Admin0228";
        let state = { teachers: [], records: [], isAdmin: false };
        let charts = { kehadiran: null, kategori: null };

        window.addEventListener('load', () => { 
            if(typeof lucide !== 'undefined') lucide.createIcons(); 
            loadInitialData(); 
            setupAutocomplete(); 
            document.getElementById('filter-date').valueAsDate = new Date();
        });

        async function loadInitialData() {
            showLoading(true);
            try {
                const response = await fetch(`${API_URL}?action=getInitialData`, { method: 'POST', body: JSON.stringify({}) });
                const data = await response.json();
                state.teachers = data.teachers || [];
                state.records = data.records || [];
                if(state.isAdmin) {
                    updateDashboard();
                    renderTeacherList();
                    renderRecords();
                }
            } catch (e) { console.error("Error:", e); }
            finally { showLoading(false); }
        }

        function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }

        // --- UTILITY: FORMAT DATE TO DD/MM/YYYY (Sama seperti GAS) ---
        function formatDateToMY(dateInput) {
            if (!dateInput) return "";
            const d = new Date(dateInput);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        // --- UTILITY: FORMAT 24H TO 12H (Untuk paparan cantik) ---
        function format12h(timeStr) {
            if (!timeStr || !timeStr.includes(':')) return timeStr;
            let [h, m] = timeStr.split(':');
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return `${h}:${m} ${ampm}`;
        }

        function showAdminLogin() { document.getElementById('modal-login').classList.remove('hidden'); }
        function hideAdminLogin() { document.getElementById('modal-login').classList.add('hidden'); }
        
        function verifyAdmin() {
            if(document.getElementById('admin-password').value === ADMIN_PASS) {
                state.isAdmin = true;
                hideAdminLogin();
                document.getElementById('admin-nav').classList.remove('hidden');
                document.getElementById('btn-admin-access').classList.add('hidden');
                switchTab('dashboard');
            } else { alert("Kata laluan salah!"); }
        }

        function logoutAdmin() {
            state.isAdmin = false;
            document.getElementById('admin-nav').classList.add('hidden');
            document.getElementById('btn-admin-access').classList.remove('hidden');
            switchTab('user');
            document.getElementById('admin-password').value = "";
        }

        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            
            if(tab === 'user') {
                document.getElementById('view-user').classList.remove('hidden');
            } else {
                document.getElementById(`view-admin-${tab}`).classList.remove('hidden');
                document.getElementById(`tab-${tab}`).classList.add('active-tab');
                if(tab === 'rekod') renderRecords();
                if(tab === 'dashboard') updateDashboard();
            }
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }

        function updateDashboard() {
            const todayStr = formatDateToMY(new Date());
            const todayRecs = state.records.filter(r => r.Tarikh_Mula === todayStr);
            
            const countDalaman = todayRecs.filter(r => r.Urusan_Keberadaan === 'KELUAR WAKTU BEKERJA / URUSAN DALAMAN').length;
            const countRasmi = todayRecs.filter(r => r.Urusan_Keberadaan === 'URUSAN RASMI').length;
            const countCuti = todayRecs.filter(r => r.Urusan_Keberadaan === 'CUTI').length;
            const totalTidakHadir = todayRecs.length;
            const totalHadir = Math.max(0, state.teachers.length - totalTidakHadir);

            if (charts.kehadiran) charts.kehadiran.destroy();
            const ctx1 = document.getElementById('chartKehadiran').getContext('2d');
            charts.kehadiran = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['Tiada Di Sekolah', 'Berada Di Sekolah'],
                    datasets: [{
                        data: [totalTidakHadir, totalHadir],
                        backgroundColor: ['#ef4444', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { position: 'bottom' },
                        title: { display: true, text: `Status Hari Ini (${todayStr})` } 
                    } 
                }
            });

            if (charts.kategori) charts.kategori.destroy();
            const ctx2 = document.getElementById('chartKategori').getContext('2d');
            charts.kategori = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: ['Dalaman', 'Rasmi', 'Cuti'],
                    datasets: [{
                        label: 'Bilangan Guru',
                        data: [countDalaman, countRasmi, countCuti],
                        backgroundColor: ['#3b82f6', '#10b981', '#f43f5e']
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } 
                }
            });
        }

        function renderRecords() {
            const tbody = document.getElementById('table-rekod-body');
            const fDate = document.getElementById('filter-date').value;
            const fUrusan = document.getElementById('filter-urusan').value;
            
            let formattedFilterDate = fDate ? formatDateToMY(fDate) : "";

            const filtered = state.records.filter(r => {
                const matchDate = fDate ? r.Tarikh_Mula === formattedFilterDate : true;
                const matchUrusan = fUrusan ? r.Urusan_Keberadaan === fUrusan : true;
                return matchDate && matchUrusan;
            });

            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-slate-400">Tiada rekod pada tarikh dipilih.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(r => `
                <tr class="hover:bg-slate-50/50">
                    <td class="p-3 align-top">
                        <div class="font-bold text-slate-700 leading-tight">${r.Nama}</div>
                        <div class="text-[10px] text-slate-400 uppercase font-mono">${r.ID_Rekod}</div>
                    </td>
                    <td class="p-3 align-top">
                        <span class="px-2 py-0.5 rounded text-[9px] font-bold inline-block mb-1 ${getBadgeColor(r.Urusan_Keberadaan)}">
                            ${r.Urusan_Keberadaan}
                        </span>
                        <div class="text-[11px] font-semibold text-slate-600">${r.Jenis_Urusan || r.Jenis_Cuti || r.Urusan_Keluar || '-'}</div>
                    </td>
                    <td class="p-3 align-top text-[11px]">
                        <div class="flex items-center gap-1 text-slate-500"><i data-lucide="calendar" class="w-3 h-3"></i> ${r.Tarikh_Mula} ${r.Tarikh_Tamat && r.Tarikh_Tamat !== r.Tarikh_Mula ? '- ' + r.Tarikh_Tamat : ''}</div>
                        ${r.Masa_Keluar ? `
                        <div class="flex items-center gap-1 text-blue-600 font-medium mt-1">
                            <i data-lucide="clock" class="w-3 h-3"></i> ${format12h(r.Masa_Keluar)} - ${format12h(r.Masa_Masuk)}
                        </div>` : ''}
                    </td>
                    <td class="p-3 align-top">
                        ${r.Nama_Program ? `<div class="text-[11px] font-bold text-slate-600">${r.Nama_Program}</div>` : ''}
                        ${r.Tempat ? `<div class="text-[10px] text-emerald-600 font-medium">@ ${r.Tempat}</div>` : ''}
                        <div class="text-[11px] text-slate-500 italic mt-1">${r.Catatan || '-'}</div>
                    </td>
                    <td class="p-3 text-right no-print align-top">
                        <button onclick="deleteRow('${r.ID_Rekod}')" class="p-2 text-red-300 hover:text-red-600 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function getBadgeColor(type) {
            if(type === 'URUSAN RASMI') return 'bg-emerald-100 text-emerald-700';
            if(type === 'CUTI') return 'bg-rose-100 text-rose-700';
            return 'bg-blue-100 text-blue-700';
        }

        async function deleteRow(id) {
            if(!confirm("Padam rekod ini?")) return;
            showLoading(true);
            try {
                const res = await fetch(`${API_URL}?action=deleteRecord`, { method: 'POST', body: JSON.stringify({id: id}) });
                const data = await res.json();
                if(data.success) { 
                    state.records = state.records.filter(r => r.ID_Rekod !== id); 
                    renderRecords(); 
                    updateDashboard();
                }
            } catch (e) { alert("Gagal memadam."); }
            finally { showLoading(false); }
        }

        function renderTeacherList() {
            const container = document.getElementById('teacher-list-container');
            container.innerHTML = state.teachers.map(t => `
                <div class="flex justify-between items-center p-3 bg-white border border-slate-100 rounded-xl shadow-sm">
                    <div><p class="font-bold text-sm text-slate-700">${t.nama}</p><p class="text-[10px] text-slate-400 uppercase">${t.jawatan}</p></div>
                    <span class="text-[10px] bg-slate-100 px-2 py-1 rounded text-slate-400">${t.id}</span>
                </div>
            `).join('');
        }

        document.getElementById('form-tambah-guru').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nama = document.getElementById('new-teacher-name').value;
            const jawatan = document.getElementById('new-teacher-role').value;
            showLoading(true);
            try {
                const res = await fetch(`${API_URL}?action=addTeacher`, { 
                    method: 'POST', body: JSON.stringify({nama: nama, jawatan: jawatan}) 
                });
                const data = await res.json();
                if(data.success) {
                    alert("Guru berjaya ditambah!");
                    document.getElementById('form-tambah-guru').reset();
                    loadInitialData();
                }
            } catch (e) { alert("Ralat."); }
            finally { showLoading(false); }
        });

        function toggleFormFields() {
            const urusan = document.getElementById('select-urusan').value;
            const container = document.getElementById('dynamic-fields');
            if(!urusan) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');
            const today = new Date().toISOString().split('T')[0];
            let html = '';
            if(urusan === 'KELUAR WAKTU BEKERJA / URUSAN DALAMAN') {
                html = `<div class="bg-blue-50/50 p-4 rounded-xl space-y-4">
                    <input type="text" id="urusanKeluar" placeholder="Urusan Keluar (Contoh: Klinik)" required class="w-full p-3 border rounded-xl">
                    <input type="date" id="tarikhMula" value="${today}" class="w-full p-3 border rounded-xl">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold text-slate-500 px-1">MASA KELUAR</label><input type="time" id="masaKeluar" required class="w-full p-3 border rounded-xl"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 px-1">MASA MASUK</label><input type="time" id="masaMasuk" required class="w-full p-3 border rounded-xl"></div>
                    </div>
                </div>`;
            } else if(urusan === 'URUSAN RASMI') {
                html = `<div class="bg-emerald-50/50 p-4 rounded-xl space-y-4">
                    <select id="jenisUrusan" class="w-full p-3 border rounded-xl"><option value="MESYUARAT">MESYUARAT</option><option value="BENGKEL">BENGKEL</option><option value="PROGRAM">PROGRAM</option></select>
                    <input type="text" id="namaProgram" placeholder="Nama Program" class="w-full p-3 border rounded-xl">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold text-slate-500 px-1">TARIKH MULA</label><input type="date" id="tarikhMula" value="${today}" class="w-full p-3 border rounded-xl"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 px-1">TARIKH TAMAT</label><input type="date" id="tarikhTamat" value="${today}" class="w-full p-3 border rounded-xl"></div>
                    </div>
                    <input type="text" id="tempat" placeholder="Tempat" class="w-full p-3 border rounded-xl">
                </div>`;
            } else if(urusan === 'CUTI') {
                html = `<div class="bg-rose-50/50 p-4 rounded-xl space-y-4">
                    <select id="jenisCuti" class="w-full p-3 border rounded-xl"><option value="CUTI SAKIT">CUTI SAKIT</option><option value="CRK">CRK</option><option value="CUTI KUARANTIN">CUTI KUARANTIN</option><option value="LAIN-LAIN">LAIN-LAIN</option></select>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold text-slate-500 px-1">TARIKH MULA</label><input type="date" id="tarikhMula" value="${today}" class="w-full p-3 border rounded-xl"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 px-1">TARIKH TAMAT</label><input type="date" id="tarikhTamat" value="${today}" class="w-full p-3 border rounded-xl"></div>
                    </div>
                </div>`;
            }
            container.innerHTML = html + `<textarea id="catatan" placeholder="Catatan Tambahan (Jika ada)" class="w-full p-3 border rounded-xl"></textarea>`;
        }

        function setupAutocomplete() {
            const input = document.getElementById('user-nama-input');
            const dropdown = document.getElementById('name-dropdown');
            input.addEventListener('input', () => {
                const q = input.value.toUpperCase();
                if (q.length < 1) { dropdown.classList.add('hidden'); return; }
                const matches = state.teachers.filter(t => t.nama.toUpperCase().includes(q));
                if (matches.length > 0) {
                    dropdown.innerHTML = matches.map(t => `<div class="p-3 hover:bg-blue-50 cursor-pointer text-sm font-medium border-b border-slate-50" onclick="selectTeacher('${t.nama}')">${t.nama}</div>`).join('');
                    dropdown.classList.remove('hidden');
                } else dropdown.classList.add('hidden');
            });
            document.addEventListener('click', (e) => { if(!input.contains(e.target)) dropdown.classList.add('hidden'); });
        }

        function selectTeacher(n) { 
            document.getElementById('user-nama-input').value = n; 
            document.getElementById('name-dropdown').classList.add('hidden'); 
        }

        document.getElementById('form-keberadaan').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                nama: document.getElementById('user-nama-input').value,
                urusan: document.getElementById('select-urusan').value,
                urusanKeluar: document.getElementById('urusanKeluar')?.value || "",
                tarikhMula: document.getElementById('tarikhMula')?.value || "",
                tarikhTamat: document.getElementById('tarikhTamat')?.value || "",
                masaKeluar: document.getElementById('masaKeluar')?.value || "",
                masaMasuk: document.getElementById('masaMasuk')?.value || "",
                jenisUrusan: document.getElementById('jenisUrusan')?.value || "",
                namaProgram: document.getElementById('namaProgram')?.value || "",
                jenisCuti: document.getElementById('jenisCuti')?.value || "",
                catatan: document.getElementById('catatan')?.value || "",
                tempat: document.getElementById('tempat')?.value || ""
            };
            
            if(!formData.nama || !formData.urusan) { alert("Sila lengkapkan Nama dan Urusan."); return; }

            showLoading(true);
            try {
                const res = await fetch(`${API_URL}?action=submitRecord`, { method: 'POST', body: JSON.stringify(formData) });
                const result = await res.json();
                if(result.success) { alert("Berjaya disimpan!"); location.reload(); }
            } catch (e) { alert("Ralat semasa menyimpan."); }
            finally { showLoading(false); }
        });
    </script>
</body>
</html>
