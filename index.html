<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eKeberadaan Guru - SMK Perempuan Jalan Ipoh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .loading-overlay { 
            background: rgba(255,255,255,0.8); 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 99; 
            justify-content: center; 
            align-items: center; 
        }
        @media print { .no-print { display: none; } .print-only { display: block !important; } }
        .print-only { display: none; }
        #name-dropdown { z-index: 100; }
        .active-tab { background-color: #eff6ff; color: #1d4ed8; border: 1px solid #dbeafe; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
    </div>

    <div id="app" class="max-w-md mx-auto md:max-w-4xl min-h-screen flex flex-col">
        <header class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-40 no-print">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-lg font-bold">eKeberadaan Guru</h1>
                    <p class="text-xs opacity-80">SMK Perempuan Jalan Ipoh (v.1.0.12)</p>
                </div>
                <button id="btn-admin-access" onclick="showAdminLogin()" class="p-2 bg-blue-700 hover:bg-blue-600 rounded-full transition-all border border-blue-500/30">
                    <i data-lucide="settings" class="w-6 h-6 text-white"></i>
                </button>
            </div>
        </header>

        <nav id="admin-nav" class="bg-white border-b hidden no-print">
            <div class="flex p-2 gap-2">
                <span class="px-4 py-2 text-sm font-bold text-blue-800 uppercase">Mod Pentadbir (Rekod Penuh)</span>
                <button onclick="logoutAdmin()" class="px-4 py-2 text-sm font-medium rounded-lg text-red-600 hover:bg-red-50 ml-auto flex items-center gap-1">
                    <i data-lucide="log-out" class="w-4 h-4"></i> KELUAR
                </button>
            </div>
        </nav>

        <main class="flex-grow p-4">
            <section id="view-user" class="space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="user-check" class="text-blue-600"></i> Borang Keberadaan</h2>
                    <form id="form-keberadaan" class="space-y-4">
                        <div class="relative">
                            <label class="block text-sm font-semibold mb-1 text-slate-600">NAMA GURU</label>
                            <input type="text" id="user-nama-input" placeholder="Taip nama anda..." autocomplete="off" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                            <div id="name-dropdown" class="absolute w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto hidden"></div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1 text-slate-600">URUSAN KEBERADAAN</label>
                            <select id="select-urusan" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" onchange="toggleFormFields()">
                                <option value="">-- Sila Pilih --</option>
                                <option value="KELUAR WAKTU BEKERJA / URUSAN DALAMAN">KELUAR WAKTU BEKERJA / URUSAN DALAMAN</option>
                                <option value="URUSAN RASMI">URUSAN RASMI</option>
                                <option value="CUTI">CUTI</option>
                            </select>
                        </div>
                        <div id="dynamic-fields" class="space-y-4 border-t border-slate-100 pt-4 hidden"></div>
                        <button type="submit" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-800 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="save" class="w-5 h-5"></i> SIMPAN MAKLUMAT
                        </button>
                    </form>
                </div>
            </section>

            <section id="view-admin-rekod" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="font-bold text-slate-700">Senarai Keseluruhan Rekod</h2>
                    <button onclick="window.print()" class="px-3 py-1 bg-slate-200 rounded text-xs flex items-center gap-1"><i data-lucide="printer" class="w-3 h-3"></i> Cetak</button>
                </div>
                <div class="overflow-x-auto bg-white rounded-lg border border-slate-200">
                    <table class="w-full text-left border-collapse text-[10px]">
                        <thead class="bg-slate-100 border-b font-bold uppercase text-slate-600">
                            <tr>
                                <th class="p-2 border-r">Nama Guru</th>
                                <th class="p-2 border-r">Urusan Utama</th>
                                <th class="p-2 border-r">Tarikh Mula</th>
                                <th class="p-2 border-r">Tarikh Tamat</th>
                                <th class="p-2 border-r text-rose-600">Masa Keluar</th>
                                <th class="p-2 border-r text-emerald-600">Masa Masuk</th>
                                <th class="p-2 border-r">Butiran/Program</th>
                                <th class="p-2 border-r">Tempat/Anjuran</th>
                                <th class="p-2 border-r">Catatan</th>
                                <th class="p-2 no-print text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="table-rekod-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-xl font-bold mb-4">Akses Pentadbir</h2>
            <input type="password" id="admin-password" class="w-full p-4 border rounded-2xl mb-4 text-center tracking-widest outline-none" placeholder="••••••••">
            <div class="flex gap-2">
                <button onclick="hideAdminLogin()" class="flex-1 p-3 bg-slate-100 rounded-xl">Batal</button>
                <button onclick="verifyAdmin()" class="flex-1 p-3 bg-blue-600 text-white rounded-xl">Masuk</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwCumZBnERCXzABn3L00ulOdae7B7tx1gLCmSNRgq-tGo_zHWe27boeGkPwFhlYyjjWrg/exec"; 
        const ADMIN_PASS = "Admin0228";
        let state = { teachers: [], records: [], isAdmin: false };

        window.addEventListener('load', () => { 
            if(typeof lucide !== 'undefined') lucide.createIcons(); 
            loadInitialData(); 
            setupAutocomplete(); 
        });

        async function loadInitialData() {
            showLoading(true);
            try {
                const response = await fetch(`${API_URL}?action=getInitialData`, { method: 'POST', body: JSON.stringify({}) });
                const data = await response.json();
                state.teachers = data.teachers || [];
                state.records = data.records || [];
                if(state.isAdmin) renderAllRecords();
            } catch (e) { console.error("Error:", e); } 
            finally { showLoading(false); }
        }

        function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }

        function showAdminLogin() { document.getElementById('modal-login').classList.remove('hidden'); }
        function hideAdminLogin() { document.getElementById('modal-login').classList.add('hidden'); }
        
        function verifyAdmin() {
            if(document.getElementById('admin-password').value === ADMIN_PASS) {
                state.isAdmin = true;
                hideAdminLogin();
                document.getElementById('admin-nav').classList.remove('hidden');
                document.getElementById('btn-admin-access').classList.add('hidden');
                document.getElementById('view-user').classList.add('hidden');
                document.getElementById('view-admin-rekod').classList.remove('hidden');
                renderAllRecords();
            } else { alert("Kata laluan salah!"); }
        }

        function logoutAdmin() {
            state.isAdmin = false;
            document.getElementById('admin-nav').classList.add('hidden');
            document.getElementById('btn-admin-access').classList.remove('hidden');
            document.getElementById('view-admin-rekod').classList.add('hidden');
            document.getElementById('view-user').classList.remove('hidden');
            document.getElementById('admin-password').value = "";
        }

        // --- FUNGSI DIUBAH UNTUK FORMAT 24 JAM ---
        function formatMasa(val) {
            if (!val || val === '-') return '-';
            let timeString = String(val);
            
            // Mengendalikan format tarikh pelik dari Google Sheets (1899...)
            if (timeString.includes('1899')) {
                const parts = timeString.split(' ');
                timeString = parts[parts.length - 1];
            }

            if (timeString.includes(':')) {
                try {
                    // Gunakan tarikh dummy untuk memparsing masa
                    const dummyDate = new Date('2000-01-01 ' + timeString);
                    if (!isNaN(dummyDate.getTime())) {
                        // Guna hour12: false untuk format 24 jam
                        return dummyDate.toLocaleTimeString('en-GB', { 
                            hour: '2-digit', 
                            minute: '2-digit', 
                            hour12: false 
                        });
                    }
                } catch (e) {
                    return timeString;
                }
            }
            return timeString;
        }

        function renderAllRecords() {
            const tbody = document.getElementById('table-rekod-body');
            if(state.records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="p-4 text-center">Tiada rekod ditemui.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = state.records.map(r => `
                <tr class="hover:bg-slate-50 border-b border-slate-100">
                    <td class="p-2 font-bold text-slate-700">${r.Nama || '-'}</td>
                    <td class="p-2">
                        <span class="px-1.5 py-0.5 rounded text-[9px] font-bold ${getUrusanClass(r.Urusan_Keberadaan)}">
                            ${r.Urusan_Keberadaan || '-'}
                        </span>
                    </td>
                    <td class="p-2 whitespace-nowrap">${r.Tarikh_Mula || '-'}</td>
                    <td class="p-2 whitespace-nowrap">${r.Tarikh_Tamat || '-'}</td>
                    <td class="p-2 font-medium text-rose-600">${formatMasa(r.Masa_Keluar)}</td>
                    <td class="p-2 font-medium text-emerald-600">${formatMasa(r.Masa_Masuk)}</td>
                    <td class="p-2">
                        <div class="font-bold text-slate-800">${r.Nama_Program || r.Jenis_Cuti || r.Urusan_Keluar || '-'}</div>
                        <div class="text-[9px] text-slate-400">${r.Jenis_Urusan || ''}</div>
                    </td>
                    <td class="p-2">
                        <div>${r.Tempat || '-'}</div>
                        <div class="text-[9px] text-slate-400 italic">${r.Anjuran || ''}</div>
                    </td>
                    <td class="p-2 italic text-slate-500">${r.Catatan || '-'}</td>
                    <td class="p-2 text-center no-print">
                        <button onclick="deleteRow('${r.ID_Rekod}')" class="text-red-400 hover:text-red-600 p-1">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function getUrusanClass(u) {
            if(u?.includes('KELUAR')) return 'bg-blue-100 text-blue-700';
            if(u?.includes('RASMI')) return 'bg-emerald-100 text-emerald-700';
            if(u?.includes('CUTI')) return 'bg-rose-100 text-rose-700';
            return 'bg-slate-100 text-slate-600';
        }

        async function deleteRow(id) {
            if(!confirm("Padam rekod ini?")) return;
            showLoading(true);
            try {
                const res = await fetch(`${API_URL}?action=deleteRecord`, { method: 'POST', body: JSON.stringify({id: id}) });
                const data = await res.json();
                if(data.success) { 
                    state.records = state.records.filter(r => r.ID_Rekod !== id); 
                    renderAllRecords(); 
                }
            } catch (e) { alert("Gagal memadam."); }
            finally { showLoading(false); }
        }

        function toggleFormFields() {
            const urusan = document.getElementById('select-urusan').value;
            const container = document.getElementById('dynamic-fields');
            if(!urusan) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');
            const today = new Date().toISOString().split('T')[0];
            let html = '';
            
            if(urusan === 'KELUAR WAKTU BEKERJA / URUSAN DALAMAN') {
                html = `<div class="bg-blue-50/50 p-4 rounded-xl space-y-4">
                    <input type="text" id="urusanKeluar" placeholder="Urusan Keluar (Contoh: Klinik)" required class="w-full p-3 border rounded-xl">
                    <input type="date" id="tarikhMula" value="${today}" class="w-full p-3 border rounded-xl">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 px-1 uppercase">Masa Keluar (24 Jam)</label>
                            <input type="time" id="masaKeluar" required class="w-full p-3 border rounded-xl">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 px-1 uppercase">Masa Masuk (24 Jam)</label>
                            <input type="time" id="masaMasuk" required class="w-full p-3 border rounded-xl">
                        </div>
                    </div>
                </div>`;
            } else if(urusan === 'URUSAN RASMI') {
                html = `<div class="bg-emerald-50/50 p-4 rounded-xl space-y-4">
                    <select id="jenisUrusan" class="w-full p-3 border rounded-xl"><option value="MESYUARAT">MESYUARAT</option><option value="BENGKEL">BENGKEL</option><option value="PROGRAM">PROGRAM</option></select>
                    <input type="text" id="namaProgram" placeholder="Nama Program / Bengkel" class="w-full p-3 border rounded-xl">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold text-slate-500 px-1 uppercase">Tarikh Mula</label><input type="date" id="tarikhMula" value="${today}" class="w-full p-3 border rounded-xl"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 px-1 uppercase">Tarikh Tamat</label><input type="date" id="tarikhTamat" value="${today}" class="w-full p-3 border rounded-xl"></div>
                    </div>
                    <input type="text" id="tempat" placeholder="Tempat" class="w-full p-3 border rounded-xl">
                    <input type="text" id="anjuran" placeholder="Anjuran (Contoh: PPD/JPN)" class="w-full p-3 border rounded-xl">
                </div>`;
            } else if(urusan === 'CUTI') {
                html = `<div class="bg-rose-50/50 p-4 rounded-xl space-y-4">
                    <select id="jenisCuti" class="w-full p-3 border rounded-xl"><option value="CUTI SAKIT">CUTI SAKIT</option><option value="CRK">CRK</option><option value="CUTI KUARANTIN">CUTI KUARANTIN</option><option value="LAIN-LAIN">LAIN-LAIN</option></select>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-bold text-slate-500 px-1 uppercase">Tarikh Mula</label><input type="date" id="tarikhMula" value="${today}" class="w-full p-3 border rounded-xl"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 px-1 uppercase">Tarikh Tamat</label><input type="date" id="tarikhTamat" value="${today}" class="w-full p-3 border rounded-xl"></div>
                    </div>
                </div>`;
            }
            container.innerHTML = html + `<textarea id="catatan" placeholder="Catatan Tambahan (Jika ada)" class="w-full p-3 border rounded-xl"></textarea>`;
        }

        function setupAutocomplete() {
            const input = document.getElementById('user-nama-input');
            const dropdown = document.getElementById('name-dropdown');
            input.addEventListener('input', () => {
                const q = input.value.toUpperCase();
                if (q.length < 1) { dropdown.classList.add('hidden'); return; }
                const matches = state.teachers.filter(t => t.nama.toUpperCase().includes(q));
                if (matches.length > 0) {
                    dropdown.innerHTML = matches.map(t => `<div class="p-3 hover:bg-blue-50 cursor-pointer text-sm font-medium border-b border-slate-50" onclick="selectTeacher('${t.nama}')">${t.nama}</div>`).join('');
                    dropdown.classList.remove('hidden');
                } else dropdown.classList.add('hidden');
            });
            document.addEventListener('click', (e) => { if(!input.contains(e.target)) dropdown.classList.add('hidden'); });
        }

        function selectTeacher(n) { 
            document.getElementById('user-nama-input').value = n; 
            document.getElementById('name-dropdown').classList.add('hidden'); 
        }

        document.getElementById('form-keberadaan').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                nama: document.getElementById('user-nama-input').value,
                urusan: document.getElementById('select-urusan').value,
                urusanKeluar: document.getElementById('urusanKeluar')?.value || "",
                tarikhMula: document.getElementById('tarikhMula')?.value || "",
                tarikhTamat: document.getElementById('tarikhTamat')?.value || "",
                masaKeluar: document.getElementById('masaKeluar')?.value || "",
                masaMasuk: document.getElementById('masaMasuk')?.value || "",
                jenisUrusan: document.getElementById('jenisUrusan')?.value || "",
                namaProgram: document.getElementById('namaProgram')?.value || "",
                jenisCuti: document.getElementById('jenisCuti')?.value || "",
                catatan: document.getElementById('catatan')?.value || "",
                tempat: document.getElementById('tempat')?.value || "",
                anjuran: document.getElementById('anjuran')?.value || ""
            };
            if(!formData.nama || !formData.urusan) { alert("Sila lengkapkan Nama dan Urusan."); return; }
            showLoading(true);
            try {
                const res = await fetch(`${API_URL}?action=submitRecord`, { method: 'POST', body: JSON.stringify(formData) });
                const result = await res.json();
                if(result.success) { alert("Berjaya disimpan!"); location.reload(); }
            } catch (e) { alert("Ralat semasa menyimpan."); }
            finally { showLoading(false); }
        });
    </script>
</body>
</html>
